{% extends "base.html" %}

{% block title %}Admin Logs{% endblock %}

{% block content %}
<h1>Last 100 HTTP Requests</h1>

<table>
    <thead>
        <tr>
            <th>Method</th>
            <th>Path</th>
            <th>User</th>
            <th>Timestamp</th>
        </tr>
    </thead>
    <tbody>
        {% for log in logs %}
        <tr>
            <td>{{ log.method }}</td>
            <td>{{ log.path }}</td>
            <td>{{ log.user }}</td>
            <td>{{ log.timestamp.replace("T", " ")[:19] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="/">Back to Home</a>
{% endblock %}
