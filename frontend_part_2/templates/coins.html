{% extends "base.html" %}

{% block content %}
<div class="landing-page">
    <h1>Apprenticeship Coins</h1>

    {% if coins %}
    <div class="grid">
        {% for coin in coins %}
        <div class="card">
            <a href="{{ url_for('coin_page', coin_id=coin.id,  testing=request.args.get('testing'), fixture=request.args.get('fixture')) }}">
                {{ coin.name }}
            </a>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p class="no-coins-message muted">No Coins Available</p>
    {% endif %}
</div>
{% endblock %}
