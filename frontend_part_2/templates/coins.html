<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/coins.css') }}">
    <title>Apprenticeship Coins</title>
</head>
<body>
    <h1>Apprenticeship Coins</h1>
    <ul class="coins-list">
    {% for coin in coins %}
      <li class="single-coin">
        <a href="{{ url_for('coin_page', coin_id=coin.id) }}" class="coin-name">{{ coin.name }}</a>
      </li>
    {% endfor %}
</ul>
</body>
</html>
