{% extends "base.html" %}

{% block content %}
<h1>Apprenticeship Coins</h1>

<div class="grid">
    {% for coin in coins %}
    <div class="card">
        <a href="{{ url_for('coin_page', coin_id=coin.id) }}">
            {{ coin.name }}
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
