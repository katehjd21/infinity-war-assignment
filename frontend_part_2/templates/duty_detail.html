<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/coins.css') }}">
    <title>{{ duty.code }} - {{ duty.name }}</title>
</head>
<body>
    <h1>{{ duty.code }} - {{ duty.name }}</h1>

    <h2>Description</h2>
    <p>{{ duty.description }}</p>

    <h2>Coins associated with this duty</h2>
    {% if duty.coins %}
        <ul>
        {% for coin in duty.coins %}
            <li>
                <a href="{{ url_for('coin_page', coin_id=coin['id']) }}">{{ coin['name'] }}</a>
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No coins associated with this duty.</p>
    {% endif %}

    <p><a href="{{ url_for('landing_page') }}">Back to all coins</a></p>
</body>
</html>
