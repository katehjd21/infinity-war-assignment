<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/coins.css') }}">
    <title>{{ coin.name }}</title>
</head>
<body>
    <h1>{{ coin.name }}</h1>
    
    {% if coin.duties %}
        <h2>Related Duties</h2>
        <ul class="duties-list">
        {% for duty in coin.duties %}
            <li>{{ duty['code'] }} - {{ duty['name'] }}</li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No duties associated with this coin.</p>
    {% endif %}
    
    <p><a href="{{ url_for('landing_page') }}">Back to all coins</a></p>
</body>
</html>
