{% extends "base.html" %}
{% block content %}
<h1>{{ duty.code and "Edit Duty" or "Create Duty" }}</h1>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST" class="form-container">

    <div class="form-group">
        <label for="code">Duty Code</label>
        <input type="text" name="code" id="code" value="{{ duty.code if duty else '' }}" required {% if duty and duty.id %}readonly{% endif %}>
    </div>

    <div class="form-group">
        <label for="name">Duty Name</label>
        <input type="text" name="name" id="name" value="{{ duty.name if duty else '' }}" required>
    </div>

    <div class="form-group">
        <label for="description">Description</label>
        <textarea name="description" id="description" required>{{ duty.description if duty else '' }}</textarea>
    </div>

    <div class="form-group">
        <label>Assign Coins</label>
        <div class="coin-checkboxes">
            {% for coin in all_coins %}
                <label>
                    <input type="checkbox" name="coin_ids" value="{{ coin.id }}"
                    {% if duty and coin.id in duty.assigned_coin_ids %}checked{% endif %}>
                    {{ coin.name }}
                </label>
            {% endfor %}
        </div>
    </div>

    <div class="form-group">
        <label for="ksb_codes">KSB Codes (comma-separated)</label>
        <input type="text" name="ksb_codes" id="ksb_codes" value="{{ duty.ksbs|join(',') if duty and duty.ksbs else '' }}">
    </div>

    <button type="submit" class="save-button">Save</button>
</form>

<a href="{{ url_for('admin_duties_page') }}" class="back-link">Back to Duties</a>
{% endblock %}
