version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backend-app
    env_file:
      - ./backend/.env
    networks:
      - infinity-war-network
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build: ./frontend_part_2
    container_name: frontend-app
    env_file:
      - ./frontend_part_2/.env
    networks:
      - infinity-war-network
    ports:
      - "80:8080"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  infinity-war-network:
    driver: bridge